apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: selecoes-dev
resources:
- ../../base
- namespace.yaml
patches:
- path: patch-deployment.yaml
- path: patch-ingress.yaml
- path: patch-hpa.yaml
configMapGenerator:
- behavior: merge
  literals:
  - LOG_LEVEL="debug"
  - MESSAGE="Serviço Seleções Development"
  name: selecoes-config
  options:
    disableNameSuffixHash: true
images:
- name: harbor.unilab.edu.br/unilab/selecoes
  newTag: dev-1e940065
