apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Define o namespace para todos os recursos
namespace: selecoes-prd

resources:
- ../../base
- namespace.yaml

patches:
- path: patch-deployment.yaml
- path: patch-ingress.yaml
- path: patch-hpa.yaml

# MERGE com valores específicos de PRODUCTION
configMapGenerator:
- behavior: merge
  literals:
  - LOG_LEVEL="error"
  - MESSAGE="Serviço Seleções Production"
  name: selecoes-config
  options:
    disableNameSuffixHash: true

images:
- name: dti-registro.unilab.edu.br/unilab/selecoes
  newTag: v5.0.14
